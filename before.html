<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Budget Dashboard | Travel Planner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e3e7f1 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: linear-gradient(to right, #2c3e50, #4a6491);
            color: white;
            padding: 25px 0;
            border-radius: 0 0 20px 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
            margin-bottom: 30px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subtitle i {
            color: #3498db;
        }

        /* Trip Selector */
        .trip-selector {
            display: flex;
            gap: 15px;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .trip-select {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            min-width: 200px;
            font-size: 1rem;
        }

        .add-trip-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .add-trip-btn:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }

        /* Main Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }

        @media (max-width: 1200px) {
            .dashboard-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Summary Cards */
        .summary-card {
            background-color: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .summary-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.12);
        }

        .summary-card.total {
            border-top: 5px solid #3498db;
        }

        .summary-card.remaining {
            border-top: 5px solid #2ecc71;
        }

        .summary-card.daily {
            border-top: 5px solid #9b59b6;
        }

        .summary-card.spent {
            border-top: 5px solid #e74c3c;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #2c3e50;
        }

        .card-icon {
            font-size: 1.8rem;
            color: #3498db;
        }

        .summary-card.remaining .card-icon {
            color: #2ecc71;
        }

        .summary-card.daily .card-icon {
            color: #9b59b6;
        }

        .summary-card.spent .card-icon {
            color: #e74c3c;
        }

        .card-amount {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .card-subtext {
            font-size: 0.95rem;
            color: #7f8c8d;
        }

        .progress-container {
            margin-top: 20px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #7f8c8d;
        }

        .progress-bar {
            height: 10px;
            background-color: #ecf0f1;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 0.8s ease;
        }

        .budget-health {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .health-good {
            background-color: #d5f4e6;
            color: #27ae60;
        }

        .health-warning {
            background-color: #fdebd0;
            color: #e67e22;
        }

        .health-danger {
            background-color: #fadbd8;
            color: #e74c3c;
        }

        /* Main Content Layout */
        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 1100px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        /* Expense Breakdown Section */
        .expense-breakdown-section {
            background-color: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 30px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: #3498db;
        }

        .chart-type-selector {
            display: flex;
            gap: 10px;
            background-color: #f8f9fa;
            padding: 5px;
            border-radius: 10px;
        }

        .chart-type-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            background: transparent;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .chart-type-btn.active {
            background-color: white;
            color: #3498db;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .chart-container {
            height: 300px;
            margin-bottom: 20px;
            position: relative;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }

        .chart-description {
            text-align: center;
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-top: 10px;
            font-style: italic;
        }

        /* Category Management */
        .category-management {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
        }

        .category-edit-btn {
            background: #f8f9fa;
            border: 2px solid #e1e5ee;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .category-edit-btn:hover {
            background: #e9ecef;
            border-color: #3498db;
        }

        /* Cost Breakdown Table */
        .cost-breakdown {
            background-color: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 30px;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid #f0f0f0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #f8f9fa;
            padding: 18px 15px;
            text-align: left;
            font-weight: 600;
            color: #2c3e50;
            border-bottom: 2px solid #e1e5ee;
            white-space: nowrap;
        }

        td {
            padding: 18px 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background-color: #f9f9f9;
        }

        .category-cell {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .category-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
        }

        .category-info {
            display: flex;
            flex-direction: column;
        }

        .category-name {
            font-weight: 600;
            color: #2c3e50;
        }

        .category-desc {
            font-size: 0.85rem;
            color: #7f8c8d;
        }

        .cost-cell {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .percentage-cell {
            font-weight: 500;
            color: #7f8c8d;
        }

        .status-cell {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .status-on-track {
            background-color: #2ecc71;
        }

        .status-overspent {
            background-color: #e74c3c;
        }

        .status-close {
            background-color: #f39c12;
        }

        .edit-cell {
            text-align: center;
        }

        .edit-btn {
            background: none;
            border: none;
            color: #3498db;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 5px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .edit-btn:hover {
            background-color: #f8f9fa;
            transform: scale(1.1);
        }

        /* Daily Budget Tracker */
        .daily-tracker {
            background-color: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        .daily-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .daily-stats {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 15px;
            background-color: #f8f9fa;
            border-radius: 10px;
            min-width: 80px;
        }

        .stat-value {
            font-weight: 700;
            font-size: 1.2rem;
            color: #2c3e50;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #7f8c8d;
        }

        .daily-list {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .daily-list::-webkit-scrollbar {
            width: 5px;
        }

        .daily-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .daily-list::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 10px;
        }

        .daily-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 12px;
            background-color: #f8f9fa;
            transition: all 0.3s;
            cursor: pointer;
        }

        .daily-item:hover {
            background-color: #f0f2f5;
            transform: translateX(5px);
        }

        .daily-item.overbudget {
            background-color: #ffeaea;
            border-left: 4px solid #e74c3c;
        }

        .daily-item.underbudget {
            background-color: #eafaf1;
            border-left: 4px solid #2ecc71;
        }

        .day-info {
            flex: 1;
        }

        .day-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .day-name {
            font-weight: 600;
            color: #2c3e50;
        }

        .day-date {
            font-size: 0.85rem;
            color: #7f8c8d;
        }

        .day-activities {
            font-size: 0.9rem;
            color: #7f8c8d;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .day-spending {
            text-align: right;
        }

        .day-amount {
            font-weight: 700;
            font-size: 1.2rem;
            color: #2c3e50;
        }

        .day-budget {
            font-size: 0.85rem;
            color: #7f8c8d;
        }

        .day-overbudget {
            color: #e74c3c;
            font-weight: 600;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        /* Alerts Section */
        .alerts-section {
            background-color: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            margin-top: 30px;
        }

        .alert {
            display: flex;
            align-items: flex-start;
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 15px;
            background-color: #fff9e6;
            border-left: 5px solid #f39c12;
        }

        .alert.warning {
            background-color: #ffeaea;
            border-left-color: #e74c3c;
        }

        .alert.success {
            background-color: #eafaf1;
            border-left-color: #2ecc71;
        }

        .alert-info {
            background-color: #e8f4fc;
            border-left-color: #3498db;
        }

        .alert-icon {
            font-size: 1.5rem;
            margin-right: 15px;
            color: #f39c12;
            margin-top: 2px;
        }

        .alert.warning .alert-icon {
            color: #e74c3c;
        }

        .alert.success .alert-icon {
            color: #2ecc71;
        }

        .alert-info .alert-icon {
            color: #3498db;
        }

        .alert-content h4 {
            margin-bottom: 5px;
            font-weight: 600;
            color: #2c3e50;
        }

        .alert-content p {
            font-size: 0.95rem;
            color: #7f8c8d;
            line-height: 1.5;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            min-width: 200px;
            padding: 16px 24px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .action-btn.primary {
            background: linear-gradient(to right, #3498db, #2980b9);
            color: white;
        }

        .action-btn.secondary {
            background-color: white;
            color: #3498db;
            border: 2px solid #3498db;
        }

        .action-btn.success {
            background: linear-gradient(to right, #2ecc71, #27ae60);
            color: white;
        }

        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background-color: white;
            border-radius: 15px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2c3e50;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #7f8c8d;
            cursor: pointer;
            padding: 5px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .close-modal:hover {
            color: #e74c3c;
            background-color: #f8f9fa;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #2c3e50;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5ee;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .form-actions button {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-save {
            background: linear-gradient(to right, #2ecc71, #27ae60);
            color: white;
            border: none;
        }

        .btn-cancel {
            background-color: #f8f9fa;
            color: #2c3e50;
            border: 2px solid #e1e5ee;
        }

        .btn-save:hover,
        .btn-cancel:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 40px;
            color: #7f8c8d;
            font-size: 0.9rem;
            padding-top: 20px;
            border-top: 1px solid #e1e5ee;
        }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }
            
            .trip-selector {
                width: 100%;
                flex-wrap: wrap;
            }
            
            .action-btn {
                min-width: 100%;
            }
            
            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            
            .chart-type-selector {
                width: 100%;
                justify-content: center;
            }
            
            .form-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div>
                    <h1>Trip Budget Dashboard</h1>
                    <p class="subtitle">
                        <i class="fas fa-map-marked-alt"></i>
                        Manage budgets for multiple destinations
                    </p>
                </div>
                <div class="trip-selector">
                    <select id="tripSelect" class="trip-select">
                        <!-- Trips will be loaded dynamically -->
                    </select>
                    <button id="addTripBtn" class="add-trip-btn">
                        <i class="fas fa-plus"></i> Add New Trip
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="container" id="dashboardContent">
        <!-- Dashboard content will be loaded dynamically -->
    </div>

    <!-- Add Trip Modal -->
    <div id="addTripModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Add New Trip</h3>
                <button class="close-modal" onclick="closeModal('addTripModal')">&times;</button>
            </div>
            <form id="addTripForm">
                <div class="form-group">
                    <label for="tripName">Trip Name</label>
                    <input type="text" id="tripName" placeholder="e.g., European Adventure 2023" required>
                </div>
                <div class="form-group">
                    <label for="tripDuration">Duration (Days)</label>
                    <input type="number" id="tripDuration" min="1" max="365" placeholder="14" required>
                </div>
                <div class="form-group">
                    <label for="tripBudget">Total Budget ($)</label>
                    <input type="number" id="tripBudget" min="100" step="100" placeholder="5000" required>
                </div>
                <div class="form-group">
                    <label for="tripDestinations">Destinations</label>
                    <input type="text" id="tripDestinations" placeholder="e.g., Paris, Rome, Barcelona" required>
                </div>
                <div class="form-group">
                    <label for="tripStartDate">Start Date</label>
                    <input type="date" id="tripStartDate" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-save">Create Trip</button>
                    <button type="button" class="btn-cancel" onclick="closeModal('addTripModal')">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Expense Modal -->
    <div id="editExpenseModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Edit Expense Category</h3>
                <button class="close-modal" onclick="closeModal('editExpenseModal')">&times;</button>
            </div>
            <form id="editExpenseForm">
                <input type="hidden" id="editCategoryId">
                <div class="form-group">
                    <label for="editCategoryName">Category Name</label>
                    <input type="text" id="editCategoryName" required>
                </div>
                <div class="form-group">
                    <label for="editCategoryBudget">Budget ($)</label>
                    <input type="number" id="editCategoryBudget" min="0" step="10" required>
                </div>

                    <label for="newCategoryDescription">Description</label>
                    <input type="text" id="newCategoryDescription" placeholder="Optional description">
                </div>
                <div class="form-group">
                    <label for="newCategoryIcon">Icon</label>
                    <select id="newCategoryIcon">
                        <option value="fa-plane">Transportation</option>
                        <option value="fa-hotel">Accommodation</option>
                        <option value="fa-utensils">Food & Dining</option>
                        <option value="fa-ticket-alt">Activities</option>
                        <option value="fa-shopping-bag">Shopping</option>
                        <option value="fa-miscellaneous">Miscellaneous</option>
                        <option value="fa-car">Car Rental</option>
                        <option value="fa-gas-pump">Fuel</option>
                        <option value="fa-gift">Gifts</option>
                        <option value="fa-camera">Photography</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-save">Add Expense Category</button>
                    <button type="button" class="btn-cancel" onclick="closeModal('addExpenseModal')">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2023 Travel Planner Pro. Manage multiple trip budgets dynamically.</p>
    </footer>

    <script>
        // Register the datalabels plugin
        Chart.register(ChartDataLabels);

        // Sample trips data - In real app, this would come from a database
        let trips = JSON.parse(localStorage.getItem('trips')) || [
            {
                id: 'trip1',
                name: 'European Adventure 2023',
                duration: 12,
                budget: 4200,
                destinations: 'Paris, Rome, Barcelona',
                startDate: '2023-05-10',
                categories: [
                    { id: 'cat1', name: 'Transportation', budget: 900, spent: 950, icon: 'fa-plane', color: '#e74c3c', description: 'Flights, trains, taxis, metro' },
                    { id: 'cat2', name: 'Accommodation', budget: 1400, spent: 1350, icon: 'fa-hotel', color: '#3498db', description: 'Hotels, Airbnb, hostels' },
                    { id: 'cat3', name: 'Food & Dining', budget: 800, spent: 720, icon: 'fa-utensils', color: '#9b59b6', description: 'Restaurants, cafes, groceries' },
                    { id: 'cat4', name: 'Activities & Tours', budget: 600, spent: 450, icon: 'fa-ticket-alt', color: '#2ecc71', description: 'Museums, attractions, shows' },
                    { id: 'cat5', name: 'Shopping', budget: 300, spent: 175, icon: 'fa-shopping-bag', color: '#f39c12', description: 'Souvenirs, gifts, clothing' },
                    { id: 'cat6', name: 'Miscellaneous', budget: 200, spent: 100, icon: 'fa-miscellaneous', color: '#1abc9c', description: 'Insurance, fees, other' }
                ],
                dailySpending: [420, 320, 285, 310, 295, 280, 270, 320, 310, 290, 285, 300]
            },
            {
                id: 'trip2',
                name: 'Asian Explorer 2023',
                duration: 21,
                budget: 3500,
                destinations: 'Tokyo, Kyoto, Seoul',
                startDate: '2023-08-15',
                categories: [
                    { id: 'cat1', name: 'Transportation', budget: 1200, spent: 1100, icon: 'fa-plane', color: '#e74c3c', description: 'Flights, trains, local transport' },
                    { id: 'cat2', name: 'Accommodation', budget: 1000, spent: 950, icon: 'fa-hotel', color: '#3498db', description: 'Hotels, ryokans' },
                    { id: 'cat3', name: 'Food & Dining', budget: 700, spent: 650, icon: 'fa-utensils', color: '#9b59b6', description: 'Restaurants, street food' },
                    { id: 'cat4', name: 'Activities & Tours', budget: 400, spent: 320, icon: 'fa-ticket-alt', color: '#2ecc71', description: 'Temples, museums, shows' },
                    { id: 'cat5', name: 'Shopping', budget: 200, spent: 180, icon: 'fa-shopping-bag', color: '#f39c12', description: 'Souvenirs, electronics' }
                ],
                dailySpending: [180, 165, 190, 175, 160, 170, 185, 190, 175, 165, 180, 170, 185, 175, 165, 190, 180, 175, 170, 165, 180]
            },
            {
                id: 'trip3',
                name: 'US Road Trip 2023',
                duration: 14,
                budget: 3000,
                destinations: 'New York, Chicago, San Francisco',
                startDate: '2023-10-01',
                categories: [
                    { id: 'cat1', name: 'Car Rental', budget: 500, spent: 450, icon: 'fa-car', color: '#34495e', description: 'SUV rental for 14 days' },
                    { id: 'cat2', name: 'Accommodation', budget: 1200, spent: 1150, icon: 'fa-hotel', color: '#3498db', description: 'Hotels, motels' },
                    { id: 'cat3', name: 'Food & Dining', budget: 800, spent: 750, icon: 'fa-utensils', color: '#9b59b6', description: 'Restaurants, fast food, groceries' },
                    { id: 'cat4', name: 'Gas & Fuel', budget: 300, spent: 280, icon: 'fa-gas-pump', color: '#e67e22', description: 'Fuel costs' },
                    { id: 'cat5', name: 'Activities', budget: 200, spent: 150, icon: 'fa-ticket-alt', color: '#2ecc71', description: 'Museums, parks, attractions' }
                ],
                dailySpending: [220, 210, 230, 215, 225, 210, 220, 215, 230, 225, 210, 220, 215, 230]
            }
        ];

        let currentTrip = trips[0];
        let expenseChart = null;
        let dailySpendingChart = null;

        // Initialize the application
        document.addEventListener('DOMContentLoaded', function() {
            saveTripsToStorage();
            initializeTripSelector();
            loadCurrentTrip();
            setupEventListeners();
        });

        // Save trips to localStorage
        function saveTripsToStorage() {
            localStorage.setItem('trips', JSON.stringify(trips));
        }

        // Initialize trip selector dropdown
        function initializeTripSelector() {
            const tripSelect = document.getElementById('tripSelect');
            tripSelect.innerHTML = '';
            
            trips.forEach((trip, index) => {
                const option = document.createElement('option');
                option.value = trip.id;
                option.textContent = `${trip.name} (${trip.destinations})`;
                if (trip.id === currentTrip.id) {
                    option.selected = true;
                }
                tripSelect.appendChild(option);
            });
        }

        // Load current trip data
        function loadCurrentTrip() {
            const dashboardContent = document.getElementById('dashboardContent');
            
            // Calculate trip statistics
            const totalSpent = currentTrip.categories.reduce((sum, cat) => sum + cat.spent, 0);
            const remainingBudget = currentTrip.budget - totalSpent;
            const averageDailyCost = totalSpent / currentTrip.duration;
            const dailyBudget = currentTrip.budget / currentTrip.duration;
            
            // Determine budget health
            const budgetPercentage = (totalSpent / currentTrip.budget) * 100;
            const budgetHealth = budgetPercentage < 80 ? 'Good' : 
                               budgetPercentage < 95 ? 'Warning' : 'Danger';
            
            // Build dashboard HTML
            dashboardContent.innerHTML = `
                <!-- Summary Dashboard -->
                <div class="dashboard-grid">
                    <div class="summary-card total">
                        <div class="budget-health health-${budgetHealth.toLowerCase()}">${budgetPercentage < 100 ? 'On Track' : 'Over Budget'}</div>
                        <div class="card-header">
                            <div class="card-title">Total Trip Cost</div>
                            <div class="card-icon"><i class="fas fa-receipt"></i></div>
                        </div>
                        <div class="card-amount">$${totalSpent.toLocaleString()}</div>
                        <div class="card-subtext">${remainingBudget >= 0 ? `$${remainingBudget} under budget` : `$${Math.abs(remainingBudget)} over budget`}</div>
                        <div class="progress-container">
                            <div class="progress-label">
                                <span>Spent</span>
                                <span>${Math.round(budgetPercentage)}% of budget</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${Math.min(budgetPercentage, 100)}%; background: linear-gradient(to right, #3498db, #2980b9);"></div>
                            </div>
                        </div>
                    </div>

                    <div class="summary-card remaining">
                        <div class="budget-health health-${remainingBudget >= 0 ? 'good' : 'danger'}">${remainingBudget >= 0 ? 'Good' : 'Danger'}</div>
                        <div class="card-header">
                            <div class="card-title">Remaining Budget</div>
                            <div class="card-icon"><i class="fas fa-wallet"></i></div>
                        </div>
                        <div class="card-amount">$${Math.abs(remainingBudget).toLocaleString()}</div>
                        <div class="card-subtext">$${Math.round(Math.abs(remainingBudget) / currentTrip.duration)} per day remaining</div>
                        <div class="progress-container">
                            <div class="progress-label">
                                <span>Available</span>
                                <span>${Math.round(100 - budgetPercentage)}% of budget</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${100 - budgetPercentage}%; background: linear-gradient(to right, #2ecc71, #27ae60);"></div>
                            </div>
                        </div>
                    </div>

                    <div class="summary-card daily">
                        <div class="budget-health health-${averageDailyCost <= dailyBudget ? 'good' : 'warning'}">${averageDailyCost <= dailyBudget ? 'Good' : 'Warning'}</div>
                        <div class="card-header">
                            <div class="card-title">Average Daily Cost</div>
                            <div class="card-icon"><i class="fas fa-calendar-day"></i></div>
                        </div>
                        <div class="card-amount">$${Math.round(averageDailyCost)}</div>
                        <div class="card-subtext">${averageDailyCost <= dailyBudget ? `$${Math.round(dailyBudget - averageDailyCost)} under daily budget` : `$${Math.round(averageDailyCost - dailyBudget)} over daily budget`}</div>
                        <div class="progress-container">
                            <div class="progress-label">
                                <span>Daily Average</span>
                                <span>${Math.round((averageDailyCost / dailyBudget) * 100)}% of budget</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${(averageDailyCost / dailyBudget) * 100}%; background: linear-gradient(to right, #9b59b6, #8e44ad);"></div>
                            </div>
                        </div>
                    </div>

                    <div class="summary-card spent">
                        <div class="budget-health health-${totalSpent <= currentTrip.budget ? 'good' : 'danger'}">${totalSpent <= currentTrip.budget ? 'Good' : 'Danger'}</div>
                        <div class="card-header">
                            <div class="card-title">Total Spent</div>
                            <div class="card-icon"><i class="fas fa-money-bill-wave"></i></div>
                        </div>
                        <div class="card-amount">$${totalSpent.toLocaleString()}</div>
                        <div class="card-subtext">Across ${currentTrip.categories.length} categories</div>
                        <div class="progress-container">
                            <div class="progress-label">
                                <span>Expenses</span>
                                <span>${currentTrip.duration} days total</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${(totalSpent / currentTrip.budget) * 100}%; background: linear-gradient(to right, #e74c3c, #c0392b);"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="main-content">
                    <!-- Left Column: Charts and Table -->
                    <div>
                        <!-- Expense Breakdown Section -->
                        <div class="expense-breakdown-section">
                            <div class="section-header">
                                <div class="section-title">
                                    <i class="fas fa-chart-pie"></i>
                                    Expense Breakdown
                                </div>
                                <div class="chart-type-selector">
                                    <button class="chart-type-btn active" data-chart="pie">Pie Chart</button>
                                    <button class="chart-type-btn" data-chart="doughnut">Doughnut</button>
                                    <button class="chart-type-btn" data-chart="bar">Bar Chart</button>
                                </div>
                            </div>
                            
                            <div class="charts-grid">
                                <div>
                                    <div class="chart-container">
                                        <canvas id="expenseChart"></canvas>
                                    </div>
                                    <p class="chart-description" id="expenseChartDesc">
                                        Distribution of expenses across categories
                                    </p>
                                </div>
                                <div>
                                    <div class="chart-container">
                                        <canvas id="dailySpendingChart"></canvas>
                                    </div>
                                    <p class="chart-description">
                                        Daily spending compared to budget
                                    </p>
                                </div>
                            </div>
                            
                            <div class="category-management">
                                <button class="category-edit-btn" onclick="openModal('addExpenseModal')">
                                    <i class="fas fa-plus-circle"></i> Add Expense Category
                                </button>
                                <button class="category-edit-btn" onclick="openModal('editExpenseModal')">
                                    <i class="fas fa-edit"></i> Edit Categories
                                </button>
                            </div>
                        </div>

                        <!-- Cost Breakdown Table -->
                        <div class="cost-breakdown">
                            <div class="section-header">
                                <div class="section-title">
                                    <i class="fas fa-list-alt"></i>
                                    Detailed Cost Breakdown
                                </div>
                                <button class="action-btn secondary" style="padding: 10px 20px; font-size: 0.9rem;" onclick="openModal('addExpenseModal')">
                                    <i class="fas fa-plus-circle"></i> Add Expense
                                </button>
                            </div>
                            
                            <div class="table-container">
                                <table id="expenseTable">
                                    <thead>
                                        <tr>
                                            <th>Category</th>
                                            <th>Budget</th>
                                            <th>Spent</th>
                                            <th>Remaining</th>
                                            <th>Status</th>
                                            <th>Edit</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${currentTrip.categories.map(category => {
                                            const remaining = category.budget - category.spent;
                                            const status = remaining >= 0 ? 'on-track' : 'overspent';
                                            const statusText = remaining >= 0 ? 'On Track' : 'Over Budget';
                                            const statusClass = remaining >= 0 ? 'status-on-track' : 'status-overspent';
                                            const remainingColor = remaining >= 0 ? '#2ecc71' : '#e74c3c';
                                            const percentage = Math.round((category.spent / category.budget) * 100);
                                            
                                            return `
                                                <tr>
                                                    <td>
                                                        <div class="category-cell">
                                                            <div class="category-icon" style="background: linear-gradient(to right, ${category.color}, ${darkenColor(category.color, 20)});">
                                                                <i class="fas ${category.icon}"></i>
                                                            </div>
                                                            <div class="category-info">
                                                                <div class="category-name">${category.name}</div>
                                                                <div class="category-desc">${category.description || 'No description'}</div>
                                                            </div>
                                                        </div>
                                                    </td>
                                                    <td class="cost-cell">$${category.budget.toLocaleString()}</td>
                                                    <td class="cost-cell">$${category.spent.toLocaleString()}</td>
                                                    <td class="cost-cell" style="color: ${remainingColor};">${remaining >= 0 ? '$' + remaining : '-$' + Math.abs(remaining)}</td>
                                                    <td>
                                                        <div class="status-cell">
                                                            <span class="status-indicator ${statusClass}"></span>
                                                            ${statusText} (${percentage}%)
                                                        </div>
                                                    </td>
                                                    <td class="edit-cell">
                                                        <button class="edit-btn" onclick="editCategory('${category.id}')">
                                                            <i class="fas fa-edit"></i>
                                                        </button>
                                                    </td>
                                                </tr>
                                            `;
                                        }).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- Right Column: Daily Tracker and Alerts -->
                    <div>
                        <!-- Daily Budget Tracker -->
                        <div class="daily-tracker">
                            <div class="daily-header">
                                <div class="section-title">
                                    <i class="fas fa-calendar-check"></i>
                                    Daily Spending
                                </div>
                                <div class="daily-stats">
                                    <div class="stat-item">
                                        <div class="stat-value">$${Math.round(dailyBudget)}</div>
                                        <div class="stat-label">Daily Budget</div>
                                    </div>
                                    <div class="stat-item">
                                        <div class="stat-value">$${Math.round(averageDailyCost)}</div>
                                        <div class="stat-label">Avg. Daily</div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="daily-list">
                                ${currentTrip.dailySpending.map((spending, index) => {
                                    const dayNumber = index + 1;
                                    const isOverBudget = spending > dailyBudget;
                                    const dayClass = isOverBudget ? 'overbudget' : 'underbudget';
                                    const date = new Date(currentTrip.startDate);
                                    date.setDate(date.getDate() + index);
                                    const formattedDate = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                                    const overAmount = isOverBudget ? spending - dailyBudget : 0;
                                    
                                    return `
                                        <div class="daily-item ${dayClass}">
                                            <div class="day-info">
                                                <div class="day-header">
                                                    <div class="day-name">Day ${dayNumber}</div>
                                                    <div class="day-date">${formattedDate}</div>
                                                </div>
                                                <div class="day-activities">
                                                    <i class="fas ${getDayIcon(dayNumber)}"></i>
                                                    ${getDayActivity(dayNumber, currentTrip.destinations)}
                                                </div>
                                            </div>
                                            <div class="day-spending">
                                                <div class="day-amount">$${spending}</div>
                                                <div class="day-budget">Budget: $${Math.round(dailyBudget)}</div>
                                                ${isOverBudget ? `<div class="day-overbudget">+$${overAmount} over</div>` : ''}
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>

                        <!-- Alerts Section -->
                        <div class="alerts-section">
                            <div class="section-header">
                                <div class="section-title">
                                    <i class="fas fa-bell"></i>
                                    Budget Alerts
                                </div>
                                <div class="alert-icon"><i class="fas fa-bell"></i></div>
                            </div>
                            
                            ${generateAlerts(currentTrip, dailyBudget)}
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button class="action-btn primary" onclick="exportBudgetReport()">
                        <i class="fas fa-file-export"></i> Export Budget Report
                    </button>
                    <button class="action-btn secondary" onclick="duplicateTrip()">
                        <i class="fas fa-copy"></i> Duplicate This Trip
                    </button>
                    <button class="action-btn secondary" onclick="resetTripSpending()">
                        <i class="fas fa-redo"></i> Reset Spending
                    </button>
                </div>
            `;
            
            // Initialize charts
            initializeCharts();
            setupChartEventListeners();
        }

        // Helper function to darken color
        function darkenColor(color, percent) {
            let r = parseInt(color.slice(1, 3), 16);
            let g = parseInt(color.slice(3, 5), 16);
            let b = parseInt(color.slice(5, 7), 16);
            
            r = Math.floor(r * (100 - percent) / 100);
            g = Math.floor(g * (100 - percent) / 100);
            b = Math.floor(b * (100 - percent) / 100);
            
            return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
        }

        // Helper function to get day icon
        function getDayIcon(dayNumber) {
            const icons = ['fa-plane-arrival', 'fa-landmark', 'fa-archway', 'fa-train', 'fa-history', 
                          'fa-camera', 'fa-umbrella-beach', 'fa-ship', 'fa-hiking', 'fa-bus'];
            return icons[(dayNumber - 1) % icons.length];
        }

        // Helper function to get day activity
        function getDayActivity(dayNumber, destinations) {
            const activities = [
                'Arrival and hotel check-in',
                'City exploration and landmarks',
                'Cultural sites and museums',
                'Travel between cities',
                'Historical sites visit',
                'Shopping and local markets',
                'Beach or relaxation day',
                'Boat tour or water activities',
                'Hiking or nature exploration',
                'Local food tour and dining'
            ];
            return `${activities[(dayNumber - 1) % activities.length]} in ${destinations.split(',')[0]}`;
        }

        // Generate alerts based on trip data
        function generateAlerts(trip, dailyBudget) {
            const totalSpent = trip.categories.reduce((sum, cat) => sum + cat.spent, 0);
            const remainingBudget = trip.budget - totalSpent;
            const averageDailyCost = totalSpent / trip.duration;
            const overspentCategories = trip.categories.filter(cat => cat.spent > cat.budget);
            const daysOverBudget = trip.dailySpending.filter(spending => spending > dailyBudget).length;
            
            let alertsHTML = '';
            
            // Budget status alert
            if (remainingBudget < 0) {
                alertsHTML += `
                    <div class="alert warning">
                        <div class="alert-icon"><i class="fas fa-exclamation-triangle"></i></div>
                        <div class="alert-content">
                            <h4>Over Budget Warning</h4>
                            <p>You've exceeded your total budget by $${Math.abs(remainingBudget)}. Consider adjusting your spending.</p>
                        </div>
                    </div>
                `;
            } else if (remainingBudget > 0 && remainingBudget < trip.budget * 0.1) {
                alertsHTML += `
                    <div class="alert">
                        <div class="alert-icon"><i class="fas fa-info-circle"></i></div>
                        <div class="alert-content">
                            <h4>Budget Running Low</h4>
                            <p>Only $${remainingBudget} remaining (${Math.round((remainingBudget / trip.budget) * 100)}% of budget left).</p>
                        </div>
                    </div>
                `;
            } else {
                alertsHTML += `
                    <div class="alert success">
                        <div class="alert-icon"><i class="fas fa-check-circle"></i></div>
                        <div class="alert-content">
                            <h4>Budget On Track</h4>
                            <p>You have $${remainingBudget} remaining (${Math.round((remainingBudget / trip.budget) * 100)}% of budget left).</p>
                        </div>
                    </div>
                `;
            }
            
            // Overspent categories alert
            if (overspentCategories.length > 0) {
                const categoryNames = overspentCategories.map(cat => cat.name).join(', ');
                alertsHTML += `
                    <div class="alert warning">
                        <div class="alert-icon"><i class="fas fa-exclamation-triangle"></i></div>
                        <div class="alert-content">
                            <h4>Categories Over Budget</h4>
                            <p>The following categories are over budget: ${categoryNames}.</p>
                        </div>
                    </div>
                `;
            }
            
            // Daily spending alert
            if (daysOverBudget > 0) {
                alertsHTML += `
                    <div class="alert">
                        <div class="alert-icon"><i class="fas fa-info-circle"></i></div>
                        <div class="alert-content">
                            <h4>Daily Budget Exceeded</h4>
                            <p>You exceeded your daily budget on ${daysOverBudget} day${daysOverBudget > 1 ? 's' : ''}. Average daily spend: $${Math.round(averageDailyCost)}.</p>
                        </div>
                    </div>
                `;
            }
            
            // Good job alert for categories under budget
            const underBudgetCategories = trip.categories.filter(cat => cat.spent < cat.budget * 0.8);
            if (underBudgetCategories.length > 0) {
                const categoryNames = underBudgetCategories.map(cat => cat.name).join(', ');
                alertsHTML += `
                    <div class="alert success">
                        <div class="alert-icon"><i class="fas fa-check-circle"></i></div>
                        <div class="alert-content">
                            <h4>Great Job!</h4>
                            <p>You're doing well on: ${categoryNames}.</p>
                        </div>
                    </div>
                `;
            }
            
            return alertsHTML;
        }

        // Initialize charts
        function initializeCharts() {
            // Expense Chart
            const expenseCtx = document.getElementById('expenseChart').getContext('2d');
            const expenseData = {
                labels: currentTrip.categories.map(cat => cat.name),
                datasets: [{
                    data: currentTrip.categories.map(cat => cat.spent),
                    backgroundColor: currentTrip.categories.map(cat => cat.color),
                    borderWidth: 2,
                    borderColor: '#fff',
                    hoverOffset: 15
                }]
            };
            
            expenseChart = new Chart(expenseCtx, {
                type: 'pie',
                data: expenseData,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const label = context.label || '';
                                    const value = context.raw || 0;
                                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    const percentage = Math.round((value / total) * 100);
                                    return `${label}: $${value} (${percentage}%)`;
                                }
                            }
                        },
                        datalabels: {
                            color: '#fff',
                            font: {
                                weight: 'bold',
                                size: 14
                            },
                            formatter: function(value, context) {
                                const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                const percentage = Math.round((value / total) * 100);
                                return `${percentage}%`;
                            },
                            display: function(context) {
                                return context.dataset.data[context.dataIndex] > 100;
                            }
                        }
                    },
                    animation: {
                        animateScale: true,
                        animateRotate: true
                    }
                }
            });
            
            // Daily Spending Chart
            const dailyCtx = document.getElementById('dailySpendingChart').getContext('2d');
            const dailyBudget = currentTrip.budget / currentTrip.duration;
            const dailyData = {
                labels: Array.from({length: currentTrip.duration}, (_, i) => `Day ${i + 1}`),
                datasets: [{
                    label: 'Actual Spending',
                    data: currentTrip.dailySpending,
                    backgroundColor: '#3498db',
                    borderColor: '#2980b9',
                    borderWidth: 2
                }, {
                    label: 'Daily Budget',
                    data: Array(currentTrip.duration).fill(dailyBudget),
                    backgroundColor: 'rgba(200, 200, 200, 0.3)',
                    borderColor: 'rgba(150, 150, 150, 0.5)',
                    borderWidth: 1,
                    type: 'line',
                    fill: false,
                    tension: 0.1
                }]
            };
            
            dailySpendingChart = new Chart(dailyCtx, {
                type: 'bar',
                data: dailyData,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'Amount ($)',
                                font: {
                                    weight: 'bold'
                                }
                            },
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                font: {
                                    size: 12
                                }
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const label = context.dataset.label || '';
                                    const value = context.raw || 0;
                                    if (context.dataset.label === 'Actual Spending') {
                                        const diff = value - dailyBudget;
                                        if (diff > 0) {
                                            return `${label}: $${value} (+$${diff.toFixed(0)} over budget)`;
                                        } else {
                                            return `${label}: $${value} ($${Math.abs(diff).toFixed(0)} under budget)`;
                                        }
                                    }
                                    return `${label}: $${value}`;
                                }
                            }
                        }
                    }
                }
            });
        }

        // Setup chart event listeners
        function setupChartEventListeners() {
            // Chart type buttons
            document.querySelectorAll('.chart-type-btn').forEach(button => {
                button.addEventListener('click', function() {
                    document.querySelectorAll('.chart-type-btn').forEach(btn => {
                        btn.classList.remove('active');
                    });
                    this.classList.add('active');
                    
                    const chartType = this.getAttribute('data-chart');
                    expenseChart.config.type = chartType;
                    expenseChart.update();
                    
                    const desc = document.getElementById('expenseChartDesc');
                    if (chartType === 'pie') {
                        desc.textContent = 'Pie Chart: Distribution of expenses across categories';
                    } else if (chartType === 'doughnut') {
                        desc.textContent = 'Doughnut Chart: Expense breakdown with central space';
                    } else {
                        desc.textContent = 'Bar Chart: Expense comparison by category';
                    }
                });
            });
        }

        // Setup event listeners
        function setupEventListeners() {
            // Trip selection
            document.getElementById('tripSelect').addEventListener('change', function() {
                const selectedTripId = this.value;
                currentTrip = trips.find(trip => trip.id === selectedTripId);
                loadCurrentTrip();
            });
            
            // Add trip button
            document.getElementById('addTripBtn').addEventListener('click', function() {
                openModal('addTripModal');
            });
            
            // Add trip form
            document.getElementById('addTripForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const newTrip = {
                    id: 'trip' + Date.now(),
                    name: document.getElementById('tripName').value,
                    duration: parseInt(document.getElementById('tripDuration').value),
                    budget: parseInt(document.getElementById('tripBudget').value),
                    destinations: document.getElementById('tripDestinations').value,
                    startDate: document.getElementById('tripStartDate').value,
                    categories: [
                        { id: 'cat1', name: 'Transportation', budget: Math.round(parseInt(document.getElementById('tripBudget').value) * 0.25), spent: 0, icon: 'fa-plane', color: '#e74c3c', description: 'Flights, trains, local transport' },
                        { id: 'cat2', name: 'Accommodation', budget: Math.round(parseInt(document.getElementById('tripBudget').value) * 0.35), spent: 0, icon: 'fa-hotel', color: '#3498db', description: 'Hotels, Airbnb, hostels' },
                        { id: 'cat3', name: 'Food & Dining', budget: Math.round(parseInt(document.getElementById('tripBudget').value) * 0.20), spent: 0, icon: 'fa-utensils', color: '#9b59b6', description: 'Restaurants, cafes, groceries' },
                        { id: 'cat4', name: 'Activities', budget: Math.round(parseInt(document.getElementById('tripBudget').value) * 0.15), spent: 0, icon: 'fa-ticket-alt', color: '#2ecc71', description: 'Museums, attractions, tours' },
                        { id: 'cat5', name: 'Miscellaneous', budget: Math.round(parseInt(document.getElementById('tripBudget').value) * 0.05), spent: 0, icon: 'fa-miscellaneous', color: '#1abc9c', description: 'Insurance, fees, other' }
                    ],
                    dailySpending: Array(parseInt(document.getElementById('tripDuration').value)).fill(0)
                };
                
                trips.push(newTrip);
                saveTripsToStorage();
                currentTrip = newTrip;
                initializeTripSelector();
                loadCurrentTrip();
                closeModal('addTripModal');
                this.reset();
                
                alert('New trip created successfully!');
            });
            
            // Edit expense form
            document.getElementById('editExpenseForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const categoryId = document.getElementById('editCategoryId').value;
                const category = currentTrip.categories.find(cat => cat.id === categoryId);
                
                if (category) {
                    category.name = document.getElementById('editCategoryName').value;
                    category.budget = parseInt(document.getElementById('editCategoryBudget').value);
                    category.spent = parseInt(document.getElementById('editCategorySpent').value);
                    category.description = document.getElementById('editCategoryDescription').value;
                    category.icon = document.getElementById('editCategoryIcon').value;
                    
                    saveTripsToStorage();
                    loadCurrentTrip();
                    closeModal('editExpenseModal');
                    alert('Category updated successfully!');
                }
            });
            
            // Add expense form
            document.getElementById('addExpenseForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const colors = ['#e74c3c', '#3498db', '#9b59b6', '#2ecc71', '#f39c12', '#1abc9c', '#34495e', '#e67e22', '#d35400', '#c0392b'];
                const color = colors[currentTrip.categories.length % colors.length];
                
                const newCategory = {
                    id: 'cat' + Date.now(),
                    name: document.getElementById('newCategoryName').value,
                    budget: parseInt(document.getElementById('newCategoryBudget').value),
                    spent: parseInt(document.getElementById('newCategorySpent').value),
                    icon: document.getElementById('newCategoryIcon').value,
                    color: color,
                    description: document.getElementById('newCategoryDescription').value
                };
                
                currentTrip.categories.push(newCategory);
                saveTripsToStorage();
                loadCurrentTrip();
                closeModal('addExpenseModal');
                this.reset();
                alert('New expense category added!');
            });
            
            // Set default start date to today
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('tripStartDate').value = today;
        }

        // Modal functions
        function openModal(modalId) {
            document.getElementById(modalId).style.display = 'flex';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // Edit category
        function editCategory(categoryId) {
            const category = currentTrip.categories.find(cat => cat.id === categoryId);
            if (category) {
                document.getElementById('editCategoryId').value = category.id;
                document.getElementById('editCategoryName').value = category.name;
                document.getElementById('editCategoryBudget').value = category.budget;
                document.getElementById('editCategorySpent').value = category.spent;
                document.getElementById('editCategoryDescription').value = category.description || '';
                document.getElementById('editCategoryIcon').value = category.icon;
                openModal('editExpenseModal');
            }
        }

        // Export budget report
        function exportBudgetReport() {
            const totalSpent = currentTrip.categories.reduce((sum, cat) => sum + cat.spent, 0);
            const remainingBudget = currentTrip.budget - totalSpent;
            
            let report = `Trip Budget Report\n`;
            report += `====================\n\n`;
            report += `Trip: ${currentTrip.name}\n`;
            report += `Destinations: ${currentTrip.destinations}\n`;
            report += `Duration: ${currentTrip.duration} days\n`;
            report += `Total Budget: $${currentTrip.budget}\n`;
            report += `Total Spent: $${totalSpent}\n`;
            report += `Remaining Budget: $${remainingBudget}\n\n`;
            report += `Category Breakdown:\n`;
            report += `-------------------\n`;
            
            currentTrip.categories.forEach(category => {
                const remaining = category.budget - category.spent;
                const percentage = Math.round((category.spent / category.budget) * 100);
                report += `${category.name}:\n`;
                report += `  Budget: $${category.budget}\n`;
                report += `  Spent: $${category.spent}\n`;
                report += `  Remaining: $${remaining}\n`;
                report += `  Status: ${remaining >= 0 ? 'On Track' : 'Over Budget'} (${percentage}%)\n\n`;
            });
            
            // Create a Blob with the report content
            const blob = new Blob([report], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            
            // Create a temporary link and trigger download
            const a = document.createElement('a');
            a.href = url;
            a.download = `budget-report-${currentTrip.name.replace(/\s+/g, '-').toLowerCase()}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            alert('Budget report exported successfully!');
        }

        // Duplicate trip
        function duplicateTrip() {
            const duplicatedTrip = JSON.parse(JSON.stringify(currentTrip));
            duplicatedTrip.id = 'trip' + Date.now();
            duplicatedTrip.name = duplicatedTrip.name + ' (Copy)';
            duplicatedTrip.categories = duplicatedTrip.categories.map(cat => ({
                ...cat,
                id: 'cat' + Date.now() + Math.random()
            }));
            
            trips.push(duplicatedTrip);
            saveTripsToStorage();
            initializeTripSelector();
            currentTrip = duplicatedTrip;
            loadCurrentTrip();
            
            alert('Trip duplicated successfully!');
        }

        // Reset spending
        function resetTripSpending() {
            if (confirm('Are you sure you want to reset all spending to zero? This action cannot be undone.')) {
                currentTrip.categories.forEach(category => {
                    category.spent = 0;
                });
                currentTrip.dailySpending = currentTrip.dailySpending.map(() => 0);
                saveTripsToStorage();
                loadCurrentTrip();
                alert('All spending has been reset to zero.');
            }
        }

        // Close modals when clicking outside
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        };
    </script>
</body>
